<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>พิมพ์โคมลอย</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&family=Chakra+Petch:wght@400;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --sky-deep:    #0a0b1a;
    --lantern-gold: #f5a623;
    --lantern-glow: #ffd166;
    --lantern-core: #fff4d6;
    --accent-rose:  #e8437a;
    --accent-teal:  #3ecfcf;
    --text-bright:  #fffdf0;
    --text-dim:     #a89fa0;
    --ui-font: 'Chakra Petch', sans-serif;
    --th-font: 'Sarabun', sans-serif;
    --app-vh: 1vh;
    --lantern-scale: 1;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%; height: 100%;
    background: var(--sky-deep);
    overflow: hidden;
    font-family: var(--th-font);
    color: var(--text-bright);
    -webkit-font-smoothing: antialiased;
  }
  body.lang-ja { --th-font: 'Noto Sans JP', sans-serif; }

  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)} }

  #stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  #shell { position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; z-index: 1; }

  #viewport {
    position: relative; overflow: hidden; border-radius: 4px;
    box-shadow: 0 0 80px rgba(245,166,35,0.15), 0 0 200px rgba(245,166,35,0.05);
    background: transparent;
  }
  @media (min-width: 768px) and (orientation: landscape) {
    #viewport { width: min(86vw, calc(86 * var(--app-vh) * 4 / 3)); height: min(calc(86 * var(--app-vh)), calc(86vw * 3 / 4)); }
  }
  @media (max-width: 767px), (orientation: portrait) {
    #viewport { width: 100vw; height: calc(var(--app-vh) * 100); border-radius: 0; box-shadow: none; }
  }

  #sky { position: absolute; inset: 0; background: radial-gradient(ellipse at 50% 110%, #2a1a5e 0%, #160d38 35%, #0c0b22 65%, #080814 100%); z-index: 0; }
  #sky::after {
    content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 18%;
    background: linear-gradient(180deg, transparent 0%, #050510 60%, #030308 100%);
    clip-path: polygon(0% 100%, 0% 60%, 5% 45%, 12% 55%, 20% 30%, 28% 50%, 35% 25%, 42% 40%, 50% 15%, 58% 35%, 65% 20%, 72% 45%, 80% 30%, 88% 55%, 95% 40%, 100% 60%, 100% 100%);
  }
  #moon {
    position: absolute; top: 8%; right: 12%;
    width: clamp(44px, 8vmin, 64px); height: clamp(44px, 8vmin, 64px); border-radius: 50%;
    background: radial-gradient(circle at 40% 40%, #fffae8, #fde68a 60%, #f5c842 100%);
    box-shadow: 0 0 30px 10px rgba(253,230,138,0.3), 0 0 80px 30px rgba(253,230,138,0.1); z-index: 1;
  }

  .lantern {
    position: absolute; bottom: -8%; transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center;
    z-index: 10; filter: drop-shadow(0 0 16px rgba(245,166,35,0.5));
    will-change: transform, opacity;
  }
  .lantern.float-a { animation: floatSwayA linear forwards; }
  .lantern.float-b { animation: floatSwayB linear forwards; }
  @keyframes floatSwayA {
    0%{transform:translateX(-50%) translateY(0) rotate(0);opacity:0}
    4%{opacity:1}
    25%{transform:translateX(calc(-50% + 10px)) translateY(-34vh) rotate(2.5deg)}
    60%{transform:translateX(calc(-50% - 10px)) translateY(-81vh) rotate(-2.5deg)}
    94%{opacity:1}
    100%{transform:translateX(-50%) translateY(-135vh) rotate(0);opacity:0}
  }
  @keyframes floatSwayB {
    0%{transform:translateX(-50%) translateY(0) rotate(0);opacity:0}
    4%{opacity:1}
    25%{transform:translateX(calc(-50% - 10px)) translateY(-34vh) rotate(-2.5deg)}
    60%{transform:translateX(calc(-50% + 10px)) translateY(-81vh) rotate(2.5deg)}
    94%{opacity:1}
    100%{transform:translateX(-50%) translateY(-135vh) rotate(0);opacity:0}
  }
  .lantern.float-a, .lantern.float-b { opacity: 0; }

  .lantern.escaping { animation: escapeDrift 2.4s cubic-bezier(0.25,0.6,0.3,1) forwards !important; }
  @keyframes escapeDrift {
    0%{transform:translateX(-50%) translateY(var(--escape-y,-40vh)) rotate(0);opacity:1}
    30%{transform:translateX(calc(-50% + 6px)) translateY(calc(var(--escape-y,-40vh) - 4vh)) rotate(15deg);opacity:.9}
    100%{transform:translateX(calc(-50% + 14px)) translateY(calc(var(--escape-y,-40vh) - 16vh)) rotate(15deg);opacity:0}
  }

  .lantern-svg { width: calc(clamp(48px, 9vmin, 64px) * var(--lantern-scale)); height: auto; transition: transform .1s; }
  .lantern.partial .lantern-svg { transform: scale(1.06); }

  .word-bubble {
    background: rgba(10,8,25,0.82); border: 1px solid rgba(245,166,35,0.4);
    border-radius: 20px; padding: 6px 14px;
    font-family: var(--th-font);
    font-size: calc(clamp(15px, 3.4vmin, 19px) * var(--lantern-scale));
    font-weight: 600; color: var(--lantern-core); white-space: nowrap;
    letter-spacing: 0.03em; margin-top: 4px; backdrop-filter: blur(4px);
    box-shadow: 0 0 12px rgba(245,166,35,0.2);
    transition: color .1s, border-color .1s, opacity .35s;
  }
  .word-bubble .typed { color: var(--accent-teal); }
  .word-bubble.cleared.cross .label { text-decoration: line-through; opacity: 0.55; }
  .word-bubble.cleared.vanish { opacity: 0; }
  .word-bubble .check { display: none; margin-left: 6px; color: var(--accent-teal); font-weight: 700; }
  .word-bubble.cleared.check-mode .check { display: inline; }
  .lantern.partial .word-bubble { border-color: rgba(255,209,102,0.8); }

  #hud {
    position: absolute; top: 0; left: 0; right: 0; z-index: 20;
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: max(14px, env(safe-area-inset-top)) 18px 14px;
    background: linear-gradient(180deg, rgba(5,3,18,0.7) 0%, transparent 100%);
    pointer-events: none;
  }
  #hud.hidden { display: none; }
  .hud-block { display: flex; flex-direction: column; }
  .hud-label { font-family: var(--ui-font); font-size: clamp(8px,1.6vmin,9px); letter-spacing: .15em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 2px; }
  .hud-value { font-family: var(--ui-font); font-size: clamp(20px,4.4vmin,26px); font-weight: 700; color: var(--lantern-gold); line-height: 1; text-shadow: 0 0 20px rgba(245,166,35,0.5); }
  #combo-display { text-align: center; }
  #combo-value { font-size: clamp(18px,3.8vmin,22px); color: var(--accent-rose); text-shadow: 0 0 20px rgba(232,67,122,0.6); transition: transform .1s; }
  #combo-value.pop { transform: scale(1.3); }

  #timer-bar { position: absolute; bottom: 72px; left: 0; right: 0; height: 2px; background: rgba(255,255,255,0.05); z-index: 15; }
  #timer-bar.hidden { display: none; }
  #timer-fill { height: 100%; background: linear-gradient(90deg, var(--accent-teal), var(--lantern-gold)); transition: width 1s linear; box-shadow: 0 0 8px rgba(62,207,207,0.5); }

  #input-area {
    position: absolute; bottom: 0; left: 0; right: 0; z-index: 20;
    display: flex; align-items: center; justify-content: center;
    padding: 14px 18px; padding-bottom: max(14px, env(safe-area-inset-bottom));
    background: linear-gradient(0deg, rgba(5,3,18,0.85) 0%, transparent 100%); gap: 10px;
  }
  #input-area.hidden { display: none; }
  #type-input {
    flex: 1; max-width: 360px; background: rgba(255,255,255,0.06);
    border: 1.5px solid rgba(245,166,35,0.35); border-radius: 40px; padding: 12px 22px;
    font-family: var(--th-font); font-size: clamp(16px,3.8vmin,18px); color: var(--text-bright);
    outline: none; text-align: center; letter-spacing: .04em; caret-color: var(--lantern-gold);
    transition: border-color .2s, box-shadow .2s;
  }
  #type-input:focus { border-color: rgba(245,166,35,0.75); box-shadow: 0 0 20px rgba(245,166,35,0.2); }
  #type-input.correct-flash { border-color: var(--accent-teal); box-shadow: 0 0 24px rgba(62,207,207,0.35); }

  .page {
    position: absolute; inset: 0; z-index: 40;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 22px; text-align: center; padding: 30px 24px; overflow-y: auto;
  }
  .page.hidden { display: none; }
  #page-title { background: rgba(5,3,18,0.5); backdrop-filter: blur(1px); }
  #page-setup, #page-score { background: rgba(5,3,18,0.88); backdrop-filter: blur(12px); }

  .kicker { font-family: var(--ui-font); font-size: clamp(11px,2.4vmin,12px); letter-spacing: .2em; color: var(--text-dim); text-transform: uppercase; }
  .title-main { font-family: var(--th-font); font-size: clamp(40px,11vw,72px); font-weight: 700; color: var(--lantern-glow); text-shadow: 0 0 50px rgba(245,166,35,0.55); line-height: 1.05; letter-spacing: .02em; }
  .title-roman { font-family: var(--ui-font); font-size: clamp(13px,3vmin,16px); letter-spacing: .35em; color: var(--lantern-gold); text-transform: uppercase; }
  .blurb { font-size: clamp(13px,3vmin,15px); color: var(--text-dim); max-width: 300px; line-height: 1.7; }

  .btn {
    font-family: var(--ui-font); font-size: clamp(12px,2.6vmin,13px); letter-spacing: .15em;
    text-transform: uppercase; padding: 13px 34px; border-radius: 40px;
    border: 1.5px solid var(--lantern-gold); background: transparent; color: var(--lantern-gold);
    cursor: pointer; font-weight: 600; transition: background .2s, color .2s, box-shadow .2s, transform .1s;
  }
  .btn:hover { background: var(--lantern-gold); color: var(--sky-deep); box-shadow: 0 0 30px rgba(245,166,35,0.4); transform: scale(1.03); }
  .btn:active { transform: scale(0.97); }
  .btn-lg { font-size: clamp(14px,3.2vmin,16px); padding: 16px 56px; }
  .btn-ghost { border-color: rgba(255,255,255,0.3); color: var(--text-bright); }
  .btn-ghost:hover { background: rgba(255,255,255,0.12); color: var(--text-bright); box-shadow: none; }
  .btn-row { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }

  .opt-group { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .opt-label { font-family: var(--ui-font); font-size: clamp(9px,2vmin,10px); letter-spacing: .18em; text-transform: uppercase; color: var(--text-dim); }
  .pill-row { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
  .pill {
    font-family: var(--ui-font); font-size: clamp(11px,2.4vmin,12px); letter-spacing: .08em;
    padding: 10px 22px; border-radius: 40px; border: 1.5px solid rgba(245,166,35,0.4);
    background: transparent; color: var(--lantern-gold); cursor: pointer; font-weight: 600;
    transition: background .2s, color .2s, border-color .2s, transform .1s;
  }
  .pill:hover { transform: scale(1.04); }
  .pill.active { background: rgba(245,166,35,0.22); border-color: var(--lantern-glow); color: var(--lantern-glow); }

  .stat-row { display: flex; gap: 26px; flex-wrap: wrap; justify-content: center; }
  .stat-item { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .stat-label { font-family: var(--ui-font); font-size: clamp(8px,1.8vmin,9px); letter-spacing: .15em; color: var(--text-dim); text-transform: uppercase; }
  .stat-val { font-family: var(--ui-font); font-size: clamp(18px,4vmin,22px); font-weight: 700; color: var(--text-bright); }
  .score-big { font-family: var(--ui-font); font-size: clamp(48px,12vw,80px); font-weight: 700; color: var(--lantern-gold); text-shadow: 0 0 60px rgba(245,166,35,0.6); }

  #gear-btn {
    position: absolute; top: max(12px, env(safe-area-inset-top)); right: 14px; z-index: 70;
    width: 42px; height: 42px; border-radius: 50%;
    background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.14);
    color: var(--text-bright); font-size: 20px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .2s, transform .3s;
  }
  #gear-btn:hover { background: rgba(255,255,255,0.15); transform: rotate(45deg); }
  #gear-btn.hidden { display: none; }

  #settings-overlay {
    position: absolute; inset: 0; z-index: 80;
    background: rgba(5,3,18,0.9); backdrop-filter: blur(14px);
    display: flex; align-items: center; justify-content: center; padding: 24px; overflow-y: auto;
  }
  #settings-overlay.hidden { display: none; }
  #settings-panel {
    width: 100%; max-width: 380px;
    background: rgba(20,16,40,0.7); border: 1px solid rgba(245,166,35,0.25);
    border-radius: 22px; padding: 22px 24px 18px;
    display: flex; flex-direction: column; gap: 18px;
  }
  .set-head { display: flex; align-items: center; justify-content: space-between; }
  .set-title { font-family: var(--ui-font); font-size: clamp(13px,3vmin,15px); letter-spacing: .12em; text-transform: uppercase; color: var(--lantern-glow); font-weight: 700; }
  .set-close { background: none; border: none; color: var(--text-dim); font-size: 24px; cursor: pointer; line-height: 1; padding: 0 4px; }
  .set-close:hover { color: var(--text-bright); }

  .set-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .set-name { font-family: var(--th-font); font-size: clamp(14px,3.2vmin,15px); color: var(--text-bright); }
  .set-col { display: flex; flex-direction: column; align-items: stretch; gap: 9px; }

  .toggle { position: relative; width: 46px; height: 26px; flex-shrink: 0; cursor: pointer; }
  .toggle input { position: absolute; opacity: 0; width: 100%; height: 100%; margin: 0; cursor: pointer; }
  .toggle .track { position: absolute; inset: 0; background: rgba(255,255,255,0.18); border-radius: 40px; transition: background .2s; }
  .toggle .knob { position: absolute; top: 3px; left: 3px; width: 20px; height: 20px; border-radius: 50%; background: #fff; transition: transform .2s; }
  .toggle input:checked ~ .track { background: var(--lantern-gold); }
  .toggle input:checked ~ .knob { transform: translateX(20px); }

  .seg { display: flex; gap: 6px; flex-wrap: wrap; }
  .seg button {
    font-family: var(--ui-font); font-size: clamp(10px,2.2vmin,11px); letter-spacing: .05em;
    padding: 7px 13px; border-radius: 30px; border: 1.5px solid rgba(245,166,35,0.35);
    background: transparent; color: var(--lantern-gold); cursor: pointer; font-weight: 600; transition: all .15s;
  }
  .seg button.active { background: rgba(245,166,35,0.22); border-color: var(--lantern-glow); color: var(--lantern-glow); }

  .set-divider { height: 1px; background: rgba(255,255,255,0.08); }
  .signature { text-align: center; font-family: var(--th-font); font-size: clamp(11px,2.4vmin,12px); color: var(--text-dim); letter-spacing: .04em; }
  .signature .star { color: var(--lantern-gold); }

  .particle { position: absolute; pointer-events: none; border-radius: 50%; z-index: 30; }
  @keyframes particleFly { 0%{opacity:1;transform:translate(0,0) scale(1)} 100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(0.2)} }
  @keyframes emberRise { 0%{opacity:.9;transform:translate(0,0) scale(1)} 100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(0.4)} }
</style>
</head>
<body>

<canvas id="stars"></canvas>

<div id="shell">
  <div id="viewport">
    <div id="sky"></div>
    <div id="moon"></div>

    <div id="lantern-stage"></div>

    <button id="gear-btn" aria-label="settings">⚙️</button>

    <div id="hud" class="hidden">
      <div class="hud-block">
        <div class="hud-label" data-i18n="hud_score">คะแนน</div>
        <div class="hud-value" id="score-display">0</div>
      </div>
      <div class="hud-block" id="combo-display">
        <div class="hud-label" data-i18n="hud_combo">คอมโบ</div>
        <div class="hud-value" id="combo-value">×1</div>
      </div>
      <div class="hud-block" style="text-align:right">
        <div class="hud-label" data-i18n="hud_lives">ชีวิต</div>
        <div class="hud-value" id="lives-display">❤❤❤</div>
      </div>
    </div>

    <div id="timer-bar" class="hidden"><div id="timer-fill" style="width:100%"></div></div>

    <div id="input-area" class="hidden">
      <input id="type-input" type="text" autocomplete="off" autocorrect="off"
             autocapitalize="off" spellcheck="false"
             data-i18n-ph="input_ph" placeholder="พิมพ์คำที่นี่…" inputmode="text">
    </div>

    <!-- PAGE 1: TITLE -->
    <div class="page" id="page-title">
      <div class="kicker" data-i18n="start_kicker">เกมพิมพ์ดีดภาษาไทย</div>
      <div class="title-main" id="title-main">พิมพ์โคมลอย</div>
      <div class="title-roman" id="title-roman">PIM KHOM LOY</div>
      <button class="btn btn-lg" id="to-setup-btn" data-i18n="btn_play">เล่น</button>
    </div>

    <!-- PAGE 2: SETUP -->
    <div class="page hidden" id="page-setup">
      <div class="kicker" data-i18n="setup_kicker">ตั้งค่าเกม</div>
      <div class="opt-group">
        <div class="opt-label" data-i18n="label_difficulty">ระดับความยาก</div>
        <div class="pill-row" id="diff-pills">
          <button class="pill active" data-diff="easy"   data-i18n="diff_easy">ง่าย</button>
          <button class="pill"        data-diff="medium" data-i18n="diff_medium">กลาง</button>
          <button class="pill"        data-diff="hard"   data-i18n="diff_hard">ยาก</button>
        </div>
      </div>
      <div class="opt-group">
        <div class="opt-label" data-i18n="label_time">เวลา</div>
        <div class="pill-row" id="time-pills">
          <button class="pill" data-time="10">10s</button>
          <button class="pill active" data-time="30">30s</button>
          <button class="pill" data-time="60" data-i18n="time_1min">1 นาที</button>
        </div>
      </div>
      <div class="btn-row">
        <button class="btn btn-ghost" id="setup-back-btn" data-i18n="btn_back">กลับ</button>
        <button class="btn btn-lg" id="start-game-btn" data-i18n="btn_start">เริ่ม</button>
      </div>
    </div>

    <!-- PAGE 4: SCORE -->
    <div class="page hidden" id="page-score">
      <div class="kicker" data-i18n="go_kicker">จบเกม</div>
      <div class="blurb" data-i18n="go_title" style="color:var(--lantern-glow);font-size:clamp(16px,4vmin,20px)">คะแนนของคุณ</div>
      <div class="score-big" id="final-score">0</div>
      <div class="stat-row">
        <div class="stat-item"><div class="stat-val" id="stat-words">0</div><div class="stat-label" data-i18n="stat_words">คำที่พิมพ์ได้</div></div>
        <div class="stat-item"><div class="stat-val" id="stat-combo">×1</div><div class="stat-label" data-i18n="stat_combo">คอมโบสูงสุด</div></div>
        <div class="stat-item"><div class="stat-val" id="stat-acc">0%</div><div class="stat-label" data-i18n="stat_acc">ความแม่นยำ</div></div>
      </div>
      <div class="stat-row" style="margin-top:-6px">
        <div class="stat-item"><div class="stat-val" id="stat-diff" style="font-size:clamp(14px,3.2vmin,17px);color:var(--lantern-glow)">—</div><div class="stat-label" data-i18n="label_difficulty">ระดับความยาก</div></div>
        <div class="stat-item"><div class="stat-val" id="stat-time" style="font-size:clamp(14px,3.2vmin,17px);color:var(--lantern-glow)">—</div><div class="stat-label" data-i18n="label_time">เวลา</div></div>
      </div>
      <div class="btn-row">
        <button class="btn btn-ghost" id="score-back-btn" data-i18n="btn_back">กลับ</button>
      </div>
    </div>

    <!-- SETTINGS OVERLAY -->
    <div id="settings-overlay" class="hidden">
      <div id="settings-panel">
        <div class="set-head">
          <div class="set-title" data-i18n="set_title">ตั้งค่า</div>
          <button class="set-close" id="set-close-btn">×</button>
        </div>

        <div class="set-row">
          <div class="set-name" data-i18n="set_sound">เสียงเอฟเฟกต์</div>
          <label class="toggle"><input type="checkbox" id="set-sound" checked><span class="track"></span><span class="knob"></span></label>
        </div>

        <div class="set-row">
          <div class="set-name" data-i18n="set_music">เพลงประกอบ</div>
          <label class="toggle"><input type="checkbox" id="set-music" checked><span class="track"></span><span class="knob"></span></label>
        </div>

        <div class="set-divider"></div>

        <div class="set-col">
          <div class="set-name" data-i18n="set_counts">เมื่อพิมพ์คำสำเร็จ</div>
          <div class="seg" id="counts-seg">
            <button data-count="check"  data-i18n="count_check">เครื่องหมาย ✅</button>

<script>
(function () {
  const canvas = document.getElementById('stars'); const ctx = canvas.getContext('2d');
  let stars = [];
  function resize(){ canvas.width = innerWidth; canvas.height = innerHeight; }
  function initStars(){
    stars = []; const n = Math.floor((canvas.width*canvas.height)/4000);
    for (let i=0;i<n;i++) stars.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height*0.75,r:Math.random()*1.2+0.2,a:Math.random(),speed:Math.random()*0.003+0.001,phase:Math.random()*Math.PI*2});
  }
  let t=0;
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height); t+=0.016;
    stars.forEach(s=>{ const alpha=s.a*(0.5+0.5*Math.sin(t*s.speed*60+s.phase)); ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fillStyle=`rgba(255,252,230,${alpha})`; ctx.fill(); });
    requestAnimationFrame(draw);
  }
  resize(); initStars(); draw();
  addEventListener('resize', ()=>{ resize(); initStars(); });
})();
</script>

<!-- AUDIO (WebAudio, no asset files) -->
<script>
const Audio2 = (() => {
  let ctx = null, musicOn = false, melodyTimer = null, noiseBuf = null;
  function ensure(){ if (!ctx) ctx = new (window.AudioContext||window.webkitAudioContext)(); if (ctx.state==='suspended') ctx.resume(); return ctx; }

  function getNoise(c){
    if (noiseBuf) return noiseBuf;
    const len = Math.floor(c.sampleRate * 0.05);
    noiseBuf = c.createBuffer(1, len, c.sampleRate);
    const d = noiseBuf.getChannelData(0);
    for (let i=0;i<len;i++) d[i] = (Math.random()*2-1);
    return noiseBuf;
  }

  function typeKey(){
    if (!settings.sound) return;
    const c = ensure(); const t0 = c.currentTime;
    const src = c.createBufferSource(); src.buffer = getNoise(c);
    const bp = c.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=2200; bp.Q.value=0.9;
    const ng = c.createGain();
    ng.gain.setValueAtTime(0.0001,t0);
    ng.gain.exponentialRampToValueAtTime(0.32,t0+0.002);
    ng.gain.exponentialRampToValueAtTime(0.0001,t0+0.045);
    src.connect(bp); bp.connect(ng); ng.connect(c.destination);
    src.start(t0); src.stop(t0+0.05);
    const o = c.createOscillator(), g = c.createGain();
    o.type='square'; o.frequency.value=140;
    g.gain.setValueAtTime(0.0001,t0); g.gain.exponentialRampToValueAtTime(0.12,t0+0.003); g.gain.exponentialRampToValueAtTime(0.0001,t0+0.04);
    o.connect(g); g.connect(c.destination); o.start(t0); o.stop(t0+0.05);
  }

  function ding(){
    if (!settings.sound) return;
    const c = ensure(); const t0 = c.currentTime;
    [ [1318.5,0.30], [2637.0,0.16] ].forEach(([f,vol])=>{
      const o=c.createOscillator(), g=c.createGain();
      o.type='sine'; o.frequency.value=f;
      g.gain.setValueAtTime(0.0001,t0); g.gain.exponentialRampToValueAtTime(vol,t0+0.005); g.gain.exponentialRampToValueAtTime(0.0001,t0+0.9);
      o.connect(g); g.connect(c.destination); o.start(t0); o.stop(t0+0.95);
    });
  }

  function combo(){
    if (!settings.sound) return;
    const c = ensure(); const t0=c.currentTime;
    const o=c.createOscillator(), g=c.createGain();
    o.type='sine'; o.frequency.value=1760;
    g.gain.setValueAtTime(0.0001,t0); g.gain.exponentialRampToValueAtTime(0.16,t0+0.004); g.gain.exponentialRampToValueAtTime(0.0001,t0+0.5);
    o.connect(g); g.connect(c.destination); o.start(t0); o.stop(t0+0.55);
  }

  const N = { G4:392.00, A4:440.00, B4:493.88, C5:523.25, D5:587.33, E5:659.25, G5:783.99, REST:0 };
  const MELODY = [
    [N.E5,1],[N.D5,1],[N.C5,1],[N.D5,1],
    [N.E5,1],[N.E5,1],[N.E5,2],
    [N.D5,1],[N.D5,1],[N.D5,2],
    [N.E5,1],[N.G5,1],[N.G5,2],
    [N.E5,1],[N.D5,1],[N.C5,1],[N.D5,1],
    [N.E5,1],[N.E5,1],[N.E5,1],[N.E5,1],
    [N.D5,1],[N.D5,1],[N.E5,1],[N.D5,1],
    [N.C5,2],[N.REST,2],
  ];
  const BEAT = 0.42;
  let melodyIdx = 0;
  function playNote(){
    if (!musicOn || !settings.music) return;
    const c = ensure();
    const [freq, beats] = MELODY[melodyIdx];
    const dur = beats * BEAT;
    if (freq > 0){
      [[freq,0.10],[freq*2,0.04]].forEach(([f,vol])=>{
        const o=c.createOscillator(), g=c.createGain();
        o.type='triangle'; o.frequency.value=f;
        const t0=c.currentTime;
        g.gain.setValueAtTime(0.0001,t0);
        g.gain.exponentialRampToValueAtTime(vol,t0+0.02);
        g.gain.exponentialRampToValueAtTime(0.0001,t0+Math.min(dur,0.9));
        o.connect(g); g.connect(c.destination); o.start(t0); o.stop(t0+dur+0.05);
      });
    }
    melodyIdx = (melodyIdx + 1) % MELODY.length;
    melodyTimer = setTimeout(playNote, dur*1000);
  }
  function startMusic(){ if (musicOn) return; musicOn=true; melodyIdx=0; ensure(); playNote(); }
  function stopMusic(){ musicOn=false; clearTimeout(melodyTimer); }

  return { typeKey, ding, combo, miss: ()=>{}, hit: ding, startMusic, stopMusic, ensure };
})();
</script>

<!-- GAME ENGINE -->
<script>
function setVH(){ document.documentElement.style.setProperty('--app-vh', (window.innerHeight*0.01)+'px'); }
setVH(); addEventListener('resize', setVH); addEventListener('orientationchange', ()=>setTimeout(setVH,200));

/* ── FIX 3: robust WORD_BANK detection (handles both module and window scope) ── */
const WORDS = (typeof WORD_BANK !== 'undefined' && WORD_BANK && WORD_BANK.easy)
  ? WORD_BANK
  : (window.WORD_BANK && window.WORD_BANK.easy)
    ? window.WORD_BANK
    : (() => { console.warn('[PimKhomLoy] words.js not loaded — using fallback'); return { easy:['แมว','ปลา','ดาว'], medium:['กล้วย','ความสุข'], hard:['วัฒนธรรม','เทคโนโลยี'] }; })();
['easy','medium','hard'].forEach(l=>{ if (!Array.isArray(WORDS[l]) || !WORDS[l].length) WORDS[l]=['โคมลอย']; });

let state = {
  running:false, score:0, lives:3, combo:1, maxCombo:1,
  wordsTyped:0, keystrokes:0, correctKeys:0,
  difficulty:'easy', duration:30, timeLeft:30,
  lanterns:[], spawnTimer:null, gameTimer:null,
};
let titleAmbientTimer = null;

const stage = document.getElementById('lantern-stage');
const typeInput = document.getElementById('type-input');
const scoreDisplay = document.getElementById('score-display');
const comboDisplay = document.getElementById('combo-value');
const livesDisplay = document.getElementById('lives-display');
const timerFill = document.getElementById('timer-fill');

/* ── FIX 2: easy mode flies slower (floatBase 17→21, perChar 1.3→1.8) ── */
const diffConfig = {
  easy:   { floatBase: 21.0, perChar: 1.8, interval: [3200, 4400], maxOnScreen: 3 },
  medium: { floatBase: 14.5, perChar: 1.1, interval: [2700, 3800], maxOnScreen: 4 },
  hard:   { floatBase: 12.5, perChar: 1.0, interval: [2300, 3200], maxOnScreen: 4 },
};
function floatDurationMs(word){ const c=diffConfig[state.difficulty]; return (c.floatBase + word.length*c.perChar)*1000; }

function createLantern(word, ambient){
  const duration = ambient ? (26000 + Math.random()*10000) : floatDurationMs(word);
  const leftPct = 8 + Math.random()*84;
  const el = document.createElement('div');
  el.className = 'lantern ' + (Math.random()<0.5?'float-a':'float-b');
  el.style.left = leftPct + '%';
  el.style.animationDuration = duration + 'ms';
  if (ambient) el.style.filter = 'drop-shadow(0 0 14px rgba(245,166,35,0.35)) opacity(0.55)';
  const bubble = ambient ? '' :
    `<div class="word-bubble"><span class="label"><span class="typed"></span><span class="rest">${word}</span></span><span class="check">✓</span></div>`;
  el.innerHTML = makeLanternSVG() + bubble;
  stage.appendChild(el);
  return { el, word, duration, startTime: performance.now(), escaped:false, cleared:false, ambient };
}

function startTitleAmbient(){
  stopTitleAmbient();
  const spawn = () => {
    if (!document.getElementById('page-title').classList.contains('hidden')) {
      const obj = createLantern('', true);
      obj.el.addEventListener('animationend', ()=> obj.el.remove(), { once:true });
    }
    titleAmbientTimer = setTimeout(spawn, 2200 + Math.random()*2600);
  };
  for (let i=0;i<3;i++){
    const obj = createLantern('', true);
    obj.el.style.animationDelay = `-${i*7}s`;
    obj.el.addEventListener('animationend', ()=> obj.el.remove(), { once:true });
  }
  spawn();
}
function stopTitleAmbient(){ clearTimeout(titleAmbientTimer); }

function spawnLantern(opts){
  if (!state.running) return;
  const chain = !opts || opts.chain !== false;
  const cfg = diffConfig[state.difficulty];
  if (state.lanterns.length >= cfg.maxOnScreen){ if (chain) scheduleSpawn(); return; }
  const word = WORDS[state.difficulty][Math.floor(Math.random()*WORDS[state.difficulty].length)];
  const obj = createLantern(word, false);
  state.lanterns.push(obj);
  obj.timeoutId = setTimeout(()=> escapeLantern(obj), obj.duration*0.96);
  if (chain) scheduleSpawn();
}
function scheduleSpawn(){
  if (!state.running) return;
  const cfg = diffConfig[state.difficulty];
  clearTimeout(state.spawnTimer);
  state.spawnTimer = setTimeout(spawnLantern, cfg.interval[0] + Math.random()*(cfg.interval[1]-cfg.interval[0]));
}

function currentYvh(obj){ const frac=Math.min((performance.now()-obj.startTime)/obj.duration,1); return -(frac*135); }

function escapeLantern(obj){
  if (obj.escaped || obj.cleared) return;
  obj.escaped = true; clearTimeout(obj.timeoutId);
  const idx = state.lanterns.indexOf(obj); if (idx!==-1) state.lanterns.splice(idx,1);
  obj.el.style.setProperty('--escape-y', currentYvh(obj)+'vh');
  void obj.el.offsetWidth;
  obj.el.classList.remove('float-a','float-b','partial');
  obj.el.classList.add('escaping');
  emitEmbers(obj.el);
  obj.el.addEventListener('animationend', ()=> obj.el.remove(), { once:true });
  setTimeout(()=>{ if (obj.el.parentNode) obj.el.remove(); }, 2800);
  if (state.running){ Audio2.miss(); loseLife(); }
}
function emitEmbers(ref){
  const r=ref.getBoundingClientRect(), vpR=document.getElementById('viewport').getBoundingClientRect();
  const cx=r.left-vpR.left+r.width/2, cy=r.top-vpR.top+r.height*0.35;
  const colors=['#ffd166','#ff7b2e','#f5a623','#fff4d6'];
  for (let i=0;i<6;i++){
    const p=document.createElement('div'); p.className='particle';
    const sz=2+Math.random()*3; p.style.width=p.style.height=sz+'px';
    p.style.background=colors[Math.floor(Math.random()*colors.length)];
    p.style.left=(cx+(Math.random()-0.5)*18)+'px'; p.style.top=cy+'px'; p.style.opacity='0.9';
    p.style.setProperty('--dx',((Math.random()-0.5)*24)+'px');
    p.style.setProperty('--dy',(-(30+Math.random()*45))+'px');
    p.style.animation=`emberRise ${0.9+Math.random()*0.6}s ease-out forwards`;
    stage.appendChild(p); setTimeout(()=>p.remove(),1600);
  }
}

function loseLife(){ state.lives=Math.max(0,state.lives-1); state.combo=1; updateHUD(); shakeLives(); if (state.lives<=0) endGame(); }
function updateHUD(){
  scoreDisplay.textContent = state.score.toLocaleString();
  livesDisplay.textContent = '❤'.repeat(state.lives)+'♡'.repeat(3-state.lives);
  comboDisplay.textContent = '×'+state.combo;
  comboDisplay.style.color = state.combo>=5?'var(--accent-teal)':state.combo>=3?'var(--lantern-glow)':'var(--accent-rose)';
}
function shakeLives(){ livesDisplay.style.animation='none'; void livesDisplay.offsetHeight; livesDisplay.style.animation='shake 0.4s'; }

typeInput.addEventListener('input', ()=>{
  if (!state.running) return;
  Audio2.typeKey();
  const typed = typeInput.value.trim(); state.keystrokes++;
  state.lanterns.forEach(obj=>{
    if (obj.cleared) return;
    const isPrefix = typed.length>0 && obj.word.startsWith(typed);
    obj.el.classList.toggle('partial', isPrefix);
    const b = obj.el.querySelector('.word-bubble');
    if (b){
      if (isPrefix){ b.querySelector('.typed').textContent=typed; b.querySelector('.rest').textContent=obj.word.slice(typed.length); }
      else { b.querySelector('.typed').textContent=''; b.querySelector('.rest').textContent=obj.word; }
    }
  });
  const match = state.lanterns.find(o=> !o.cleared && o.word===typed);
  if (match){
    clearWord(match); typeInput.value='';
    state.lanterns.forEach(o=>{ if (o.cleared) return; o.el.classList.remove('partial'); const b=o.el.querySelector('.word-bubble'); if(b){b.querySelector('.typed').textContent='';b.querySelector('.rest').textContent=o.word;} });
  }
});

function clearWord(obj){
  obj.cleared = true; clearTimeout(obj.timeoutId);
  const idx = state.lanterns.indexOf(obj); if (idx!==-1) state.lanterns.splice(idx,1);

  const points = obj.word.length * 10 * state.combo;
  state.score += points;
  const prevCombo = state.combo;
  state.combo = Math.min(state.combo+1,10);
  state.maxCombo = Math.max(state.maxCombo, state.combo);
  state.wordsTyped++; state.correctKeys += obj.word.length;
  updateHUD();

  Audio2.hit();
  if (state.combo>prevCombo && state.combo>=3) Audio2.combo();

  const bubble = obj.el.querySelector('.word-bubble');
  if (bubble){
    const ty=bubble.querySelector('.typed'), rt=bubble.querySelector('.rest');
    if (ty&&rt){ ty.textContent=''; rt.textContent=obj.word; }
    bubble.classList.add('cleared');
    if (settings.counts==='check')  bubble.classList.add('check-mode');
    if (settings.counts==='cross')  bubble.classList.add('cross');
    if (settings.counts==='vanish') bubble.classList.add('vanish');
  }
  obj.el.classList.remove('partial');

  showFloatingScore(obj.el, points);
  spawnHitParticles(obj.el);
  typeInput.classList.add('correct-flash'); setTimeout(()=>typeInput.classList.remove('correct-flash'),200);
  comboDisplay.classList.add('pop'); setTimeout(()=>comboDisplay.classList.remove('pop'),120);

  obj.el.addEventListener('animationend', ()=> obj.el.remove(), { once:true });
}

function showFloatingScore(ref, pts){
  const pop=document.createElement('div'); pop.textContent='+'+pts;
  pop.style.cssText=`position:absolute;font-family:var(--ui-font);font-weight:700;font-size:clamp(14px,3vmin,16px);color:var(--lantern-glow);pointer-events:none;z-index:40;white-space:nowrap;animation:particleFly 0.9s forwards ease-out;--dx:0px;--dy:-60px;`;
  const r=ref.getBoundingClientRect(), vpR=document.getElementById('viewport').getBoundingClientRect();
  pop.style.left=(r.left-vpR.left+r.width/2)+'px'; pop.style.top=(r.top-vpR.top+r.height/2)+'px';
  stage.appendChild(pop); setTimeout(()=>pop.remove(),900);
}
function spawnHitParticles(ref){
  const r=ref.getBoundingClientRect(), vpR=document.getElementById('viewport').getBoundingClientRect();
  const cx=r.left-vpR.left+r.width/2, cy=r.top-vpR.top+r.height/2;
  const colors=['#ffd166','#f5a623','#ff7b2e','#fffdf0','#3ecfcf'];
  for (let i=0;i<8;i++){
    const p=document.createElement('div'); p.className='particle';
    const a=(i/8)*Math.PI*2, d=40+Math.random()*40;
    p.style.width=p.style.height=(4+Math.random()*4)+'px';
    p.style.background=colors[Math.floor(Math.random()*colors.length)];
    p.style.left=cx+'px'; p.style.top=cy+'px';
    p.style.setProperty('--dx',Math.cos(a)*d+'px'); p.style.setProperty('--dy',Math.sin(a)*d+'px');
    p.style.animation='particleFly 0.8s forwards ease-out';
    stage.appendChild(p); setTimeout(()=>p.remove(),800);
  }
}

function startTimer(){
  state.timeLeft = state.duration;
  timerFill.style.transition='none'; timerFill.style.width='100%';
  setTimeout(()=>{ timerFill.style.transition=`width ${state.duration}s linear`; timerFill.style.width='0%'; },50);
  state.gameTimer = setInterval(()=>{ state.timeLeft--; if (state.timeLeft<=0) endGame(); },1000);
}

function showPage(id){
  ['page-title','page-setup','page-score'].forEach(p=> document.getElementById(p).classList.add('hidden'));
  if (id) document.getElementById(id).classList.remove('hidden');
}
function setGameChrome(on){
  document.getElementById('hud').classList.toggle('hidden', !on);
  document.getElementById('timer-bar').classList.toggle('hidden', !on);
  document.getElementById('input-area').classList.toggle('hidden', !on);
  document.getElementById('gear-btn').classList.toggle('hidden', on);
}

function gotoTitle(){ endGameCleanup(); clearAllLanterns(); showPage('page-title'); setGameChrome(false); startTitleAmbient(); }
function gotoSetup(){ stopTitleAmbient(); clearAllLanterns(); showPage('page-setup'); setGameChrome(false); }

function startGame(){
  stopTitleAmbient(); clearAllLanterns();
  Audio2.ensure();
  if (settings.music) Audio2.startMusic();
  Object.assign(state, { running:true, score:0, lives:3, combo:1, maxCombo:1, wordsTyped:0, keystrokes:0, correctKeys:0, lanterns:[] });
  typeInput.value=''; updateHUD();
  showPage(null); setGameChrome(true);
  startTimer();
  typeInput.focus();
  spawnLantern({ chain:false });
  setTimeout(()=>{ if (state.running) spawnLantern({ chain:false }); }, 700);
  setTimeout(()=>{ if (state.running) spawnLantern({ chain:true }); }, 1500);
}

function endGameCleanup(){ state.running=false; clearTimeout(state.spawnTimer); clearInterval(state.gameTimer); state.gameTimer=null; Audio2.stopMusic(); }
function clearAllLanterns(){ state.lanterns.forEach(o=>{ clearTimeout(o.timeoutId); }); state.lanterns=[]; stage.innerHTML=''; }

function endGame(){
  endGameCleanup();
  clearAllLanterns();
  const acc = state.keystrokes>0 ? Math.round((state.correctKeys/state.keystrokes)*100) : 0;
  document.getElementById('final-score').textContent = state.score.toLocaleString();
  document.getElementById('stat-words').textContent  = state.wordsTyped;
  document.getElementById('stat-combo').textContent  = '×'+state.maxCombo;
  document.getElementById('stat-acc').textContent    = acc+'%';
  document.getElementById('stat-diff').textContent   = tr('diff_'+state.difficulty);
  document.getElementById('stat-time').textContent   = state.duration>=60 ? tr('time_1min') : (state.duration+'s');
  setGameChrome(false);
  showPage('page-score');
}

document.getElementById('to-setup-btn').addEventListener('click', gotoSetup);
document.getElementById('setup-back-btn').addEventListener('click', gotoTitle);
document.getElementById('start-game-btn').addEventListener('click', startGame);
document.getElementById('score-back-btn').addEventListener('click', gotoSetup);

document.querySelectorAll('#diff-pills .pill').forEach(p=> p.addEventListener('click', ()=>{
  document.querySelectorAll('#diff-pills .pill').forEach(b=>b.classList.remove('active'));
  p.classList.add('active'); state.difficulty=p.dataset.diff;
}));
document.querySelectorAll('#time-pills .pill').forEach(p=> p.addEventListener('click', ()=>{
  document.querySelectorAll('#time-pills .pill').forEach(b=>b.classList.remove('active'));
  p.classList.add('active'); state.duration=parseInt(p.dataset.time,10);
}));

typeInput.addEventListener('keydown', e=>{
  if (e.key==='Enter'){ const typed=typeInput.value.trim(); const m=state.lanterns.find(o=>!o.cleared&&o.word===typed); if(m){ clearWord(m); typeInput.value=''; } }
});
document.getElementById('viewport').addEventListener('click', e=>{ if (state.running && e.target.id!=='type-input') typeInput.focus(); });
</script>

  settings.music=e.target.checked; saveSettings();
  if (settings.music){ Audio2.ensure(); Audio2.startMusic(); } else Audio2.stopMusic();
});

document.querySelectorAll('#counts-seg button').forEach(b=> b.addEventListener('click', ()=>{
  document.querySelectorAll('#counts-seg button').forEach(x=>x.classList.remove('active'));

}));

  LANG=b.dataset.lang; localStorage.setItem('komloy_lang',LANG); applyLang();
}));

loadSettings();
applySettings();
applyLang();
gotoTitle();
</script>
